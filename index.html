<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun! 🎉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e6b3ff 0%, #ffe082 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            background: #fff;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            overflow: hidden;
            z-index: 10;
        }

        /* SOL PANEL DÜZELTME */
        .left-panel {
            flex: 1.2;
            height: 100%;
            background: #f0f0f0; /* Resim gelmezse arka plan rengi */
            position: relative;
        }

        .left-panel img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Resmi paneli dolduracak şekilde ayarlar */
            display: block;
        }

        /* SAĞ PANEL */
        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-left: 1px solid #eee;
        }

        .cake-container {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .cake-container:hover {
            transform: scale(1.05);
        }

        .cake-image {
            width: 500px;
            max-width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .click-text {
            margin-top: 20px;
            color: #b3005f;
            font-weight: bold;
            font-size: 1.3rem;
            animation: bounce 2s infinite;
        }

        /* GERİ SAYIM VE MESAJ */
        .countdown {
            display: none;
            font-size: 120px;
            color: #d84389;
            font-weight: 900;
        }

        .message {
            display: none;
            text-align: center;
        }

        .message h1 {
            color: #d84389;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        /* KONFETİ */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 100;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @media (max-width: 800px) {
            .container { flex-direction: column; height: 90vh; }
            .left-panel { flex: 1; }
            .right-panel { flex: 1.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <img src="tofas.jpg" alt="Tofaş Görseli">
        </div>

        <div class="right-panel">
            <div class="cake-container" id="cakeContainer">
                <img src="pasta.png" alt="Doğum Günü Pastası" class="cake-image">
                <div class="click-text">Dileğini tut ve pastaya tıkla!</div>
            </div>

            <div class="countdown" id="countdown">3</div>

            <div class="message" id="message">
                <h1>İyi ki Doğdun! 🎉</h1>
                <p>Yeni yaşın kutlu olsun!</p>
            </div>
        </div>
    </div>

    <script>
        const cakeContainer = document.getElementById('cakeContainer');
        const countdownEl = document.getElementById('countdown');
        const messageEl = document.getElementById('message');

        let count = 3;

        cakeContainer.addEventListener('click', () => {
            cakeContainer.style.display = 'none';
            countdownEl.style.display = 'block';

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownEl.textContent = count;
                } else {
                    clearInterval(timer);
                    countdownEl.style.display = 'none';
                    messageEl.style.display = 'block';
                    fireConfetti();
                }
            }, 1000);
        });

        function fireConfetti() {
            const colors = ['#d84389', '#f2d74e', '#95c11f', '#4e9be6', '#9b59b6'];
            for (let i = 0; i < 80; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 6000);
            }
        }
    </script>
</body>
</html>
